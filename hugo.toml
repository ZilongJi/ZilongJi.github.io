baseURL = 'https://ZilongJi.github.io/'
languageCode = 'en-gb'
title = 'Zilong Ji'
theme = 'ananke'
enableRobotsTXT = true
disableKinds = ['taxonomy', 'term']

[params]
  author = 'Zilong Ji'
  description = 'Academic website of Zilong Ji, postdoctoral researcher at UCL working on computational neuroscience, spatial navigation, episodic memory, and brain-inspired AI.'
  images = ['/images/profile_photo.png']
  googleSiteVerification = ''

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menus]

  [[menus.main]]
    identifier = "about"
    name = "About"
    pageRef = "/about"
    weight = 1

  [[menus.main]]
    identifier = "research"
    name = "Research"
    pageRef = "/research"
    weight = 2

  [[menus.main]]
    identifier = "publications"
    name = "Publications"
    pageRef = "/publications"
    weight = 3

  [[menus.main]]
    identifier = "cv"
    name = "CV"
    pageRef = "/cv"
    weight = 4
